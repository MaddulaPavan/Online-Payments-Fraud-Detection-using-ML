<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result | GuardPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: var(--card-bg);
            padding: 4rem;
            border-radius: 32px;
            text-align: center;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            display: inline-block;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .result-text {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
        }

        .fraud {
            color: var(--danger);
            font-weight: 700;
        }

        .legit {
            color: var(--success);
            font-weight: 700;
        }

        .btn {
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        {% if "Fraudulent" in prediction_text %}
        <div class="icon">⚠️</div>
        {% else %}
        <div class="icon">✅</div>
        {% endif %}

        <h2>Analysis Complete</h2>
        <p class="result-text">{{ prediction_text }}</p>

        <a href="/predict_page" class="btn">New Analysis</a>
    </div>
</body>

</html>
