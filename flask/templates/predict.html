<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze Transaction | GuardPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent);
        }

        .container {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.8s ease;
        }

        .card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
        }

        input,
        select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1rem;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            grid-column: span 2;
            margin-top: 1rem;
            padding: 1rem;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h2>Transaction Details</h2>
            <form action="/submit" method="POST">
                <div class="form-group">
                    <label>Time Step (1-744)</label>
                    <input type="number" name="step" required placeholder="e.g. 1">
                </div>
                <div class="form-group">
                    <label>Transaction Type</label>
                    <select name="type" required>
                        <option value="PAYMENT">Payment</option>
                        <option value="TRANSFER">Transfer</option>
                        <option value="CASH_OUT">Cash Out</option>
                        <option value="CASH_IN">Cash In</option>
                        <option value="DEBIT">Debit</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" step="0.01" name="amount" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Original Balance (Before)</label>
                    <input type="number" step="0.01" name="oldbalanceOrg" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Original Balance (After)</label>
                    <input type="number" step="0.01" name="newbalanceOrig" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Destination Balance (Before)</label>
                    <input type="number" step="0.01" name="oldbalanceDest" required placeholder="0.00">
                </div>
                <div class="form-group full-width">
                    <label>Destination Balance (After)</label>
                    <input type="number" step="0.01" name="newbalanceDest" required placeholder="0.00">
                </div>
                <button type="submit">Analyze for Fraud</button>
            </form>
        </div>
    </div>
</body>

</html>
